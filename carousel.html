<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>

<body>
    <div class="carousel slide" id="demo" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#demo" class="active" data-bs-slide-to="0"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="1.jpg" alt="bgmi" class="d-block" style="width: 100%;">
            </div>
            <div class="carousel-item">
                <img src="1.jpg" alt="bgmi" class="d-block" style="width: 100%;">
            </div>
            <div class="carousel-item ">
                <img src="1.jpg" alt="bgmi" class="d-block" style="width: 100%;">
            </div>
        </div>
        <button type="button" class="carousel-control-prev" data-bs-slide="prev" data-bs-target="#demo">
            <span class="carousel-control-prev-icon"></span>
        </button>
        
        <button type="button" class="carousel-control-next" data-bs-slide="next" data-bs-target="#demo">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>
</body>

</html>
